# ImageStream for the fixer-agent container image.
# After a successful push from Tekton to
# image-registry.openshift-image-registry.svc:5000/<namespace>/fixer-agent:<tag>,
# OpenShift will record tags here (local lookup policy optional).
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: fixer-agent
  labels:
    app: fixer-agent
spec:
  lookupPolicy:
    local: true
