# Example PipelineRun — copy, set namespace, and apply after ImageStream + Pipeline + Tasks exist.
# Grant the ServiceAccount permission to push to the internal registry, for example:
#   oc policy add-role-to-user system:image-pusher system:serviceaccount:YOUR_NS:pipeline -n YOUR_NS
#
# The build Task derives registry credentials from the mounted ServiceAccount token (no dockerconfig Secret).
#
# shared-workspace: the Pipeline clones the Git repo here, then Kaniko builds from it. emptyDir is enough.
# Alternatively use a PVC if you need a larger disk or to debug the workspace across retries.
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: fixer-agent-build-
  labels:
    app: fixer-agent
spec:
  pipelineRef:
    name: fixer-agent-build
  serviceAccountName: pipeline
  # Optional; Pipeline defaults push to:
  # image-registry.openshift-image-registry.svc:5000/<this-namespace>/fixer-agent:latest
  # params:
  #   - name: image-tag
  #     value: "1.0.0"
  workspaces:
    - name: shared-workspace
      emptyDir: {}
