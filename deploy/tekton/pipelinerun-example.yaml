# Example PipelineRun — apply after Pipeline and ImageStream exist.
# Adjust namespace, storage class, and revision (branch/tag) as needed.
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: fixer-agent-build-
  labels:
    app.kubernetes.io/name: fixer-agent
spec:
  pipelineRef:
    name: fixer-agent-build
  serviceAccountName: pipeline
  params:
    - name: repo-url
      value: "https://github.com/earvonen/fixer-agent.git"
    - name: revision
      value: main
    - name: image-namespace
      value: fixer-agent
    - name: image-tag
      value: latest
  workspaces:
    - name: shared-workspace
      volumeClaimTemplate:
        metadata:
          generateName: fixer-agent-workspace-
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
